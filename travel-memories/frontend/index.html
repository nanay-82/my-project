<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅行メモリーズ</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      background: white;
      padding: 30px;
      border-radius: 10px;
      margin-bottom: 30px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    h1 {
      color: #667eea;
      margin-bottom: 10px;
      font-size: 2.5em;
    }

    .subtitle {
      color: #666;
      margin-bottom: 20px;
    }

    .upload-section {
      background: white;
      padding: 30px;
      border-radius: 10px;
      margin-bottom: 30px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .file-input-wrapper {
      position: relative;
      display: inline-block;
    }

    input[type="file"] {
      display: none;
    }

    .upload-btn {
      padding: 12px 30px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }

    .upload-btn:hover {
      background: #5568d3;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .stat-card {
      background: #f5f5f5;
      padding: 20px;
      border-radius: 5px;
      text-align: center;
    }

    .stat-number {
      font-size: 2em;
      font-weight: bold;
      color: #667eea;
    }

    .stat-label {
      color: #666;
      margin-top: 5px;
    }

    .content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
    }

    .map-section, .gallery-section {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .map-section h2, .gallery-section h2 {
      color: #667eea;
      margin-bottom: 15px;
      font-size: 1.5em;
    }

    #map {
      height: 500px;
      border-radius: 5px;
      overflow: hidden;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 15px;
      max-height: 600px;
      overflow-y: auto;
    }

    .photo-item {
      position: relative;
      overflow: hidden;
      border-radius: 5px;
      cursor: pointer;
      transition: transform 0.3s;
    }

    .photo-item:hover {
      transform: scale(1.05);
    }

    .photo-item img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .photo-date {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 5px;
      font-size: 12px;
      text-align: center;
    }

    .empty-message {
      text-align: center;
      color: #999;
      padding: 40px 20px;
    }

    @media (max-width: 768px) {
      .content {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 1.8em;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🗺️ 旅行メモリーズ</h1>
      <p class="subtitle">2026年3月15日～4月3日の旅行写真を地図で表示</p>
    </header>

    <div class="upload-section">
      <div class="file-input-wrapper">
        <input type="file" id="fileInput" multiple accept="image/*">
        <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
          📸 写真をアップロード
        </button>
      </div>

      <div class="stats">
        <div class="stat-card">
          <div class="stat-number" id="totalPhotos">0</div>
          <div class="stat-label">撮影枚数</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="photosWithLocation">0</div>
          <div class="stat-label">位置情報あり</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="uniqueDates">0</div>
          <div class="stat-label">訪問日数</div>
        </div>
      </div>
    </div>

    <div class="content">
      <div class="map-section">
        <h2>📍 訪問地マップ</h2>
        <div id="map"></div>
      </div>

      <div class="gallery-section">
        <h2>📷 写真ギャラリー</h2>
        <div class="gallery" id="gallery">
          <div class="empty-message">写真をアップロードしてください</div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script>
    let map;
    let photos = [];
    let markers = [];

    // Initialize map
    function initMap() {
      map = L.map('map').setView([35.6762, 139.6503], 4);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap',
        maxZoom: 19,
      }).addTo(map);
    }

    // Handle file upload
    document.getElementById('fileInput').addEventListener('change', async (e) => {
      const files = e.target.files;
      if (!files.length) return;

      const formData = new FormData();
      for (let file of files) {
        formData.append('photos', file);
      }

      try {
        const response = await fetch('/api/upload', {
          method: 'POST',
          body: formData,
        });

        if (!response.ok) throw new Error('Upload failed');

        const data = await response.json();
        photos = data.photos;
        updateUI();
        e.target.value = '';
      } catch (err) {
        alert('アップロード失敗: ' + err.message);
      }
    });

    // Update UI with photos
    function updateUI() {
      updateStats();
      updateGallery();
      updateMap();
    }

    // Update statistics
    function updateStats() {
      document.getElementById('totalPhotos').textContent = photos.length;
      const photosWithLoc = photos.filter(p => p.location?.latitude).length;
      document.getElementById('photosWithLocation').textContent = photosWithLoc;
      const uniqueDates = new Set(photos.map(p => p.date?.split('T')[0])).size;
      document.getElementById('uniqueDates').textContent = uniqueDates;
    }

    // Update gallery
    function updateGallery() {
      const gallery = document.getElementById('gallery');
      if (photos.length === 0) {
        gallery.innerHTML = '<div class="empty-message">写真をアップロードしてください</div>';
        return;
      }

      gallery.innerHTML = photos.map(photo => `
        <div class="photo-item">
          <img src="${photo.url}" alt="${photo.filename}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22150%22 height=%22150%22%3E%3Crect fill=%22%23ddd%22 width=%22150%22 height=%22150%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 font-size=%2214%22 fill=%22%23999%22%3EImage Error%3C/text%3E%3C/svg%3E'">
          <div class="photo-date">${new Date(photo.date).toLocaleDateString('ja-JP')}</div>
        </div>
      `).join('');
    }

    // Update map
    function updateMap() {
      markers.forEach(m => map.removeLayer(m));
      markers = [];

      const photosWithLocation = photos.filter(p => p.location?.latitude && p.location?.longitude);

      if (photosWithLocation.length === 0) {
        map.setView([35.6762, 139.6503], 4);
        return;
      }

      const bounds = L.latLngBounds();
      photosWithLocation.forEach(photo => {
        const marker = L.marker([photo.location.latitude, photo.location.longitude])
          .addTo(map)
          .bindPopup(`<strong>${photo.filename}</strong><br>${new Date(photo.date).toLocaleDateString('ja-JP')}`);
        markers.push(marker);
        bounds.extend([photo.location.latitude, photo.location.longitude]);
      });

      map.fitBounds(bounds, { padding: [50, 50] });
    }

    // Initialize on load
    initMap();
  </script>
</body>
</html>
