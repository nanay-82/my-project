<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タスク管理</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    padding: 24px 16px;
  }

  .container {
    max-width: 560px;
    margin: 0 auto;
  }

  h1 {
    font-size: 22px;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }

  .input-row input {
    flex: 1;
    padding: 12px 16px;
    border: 2px solid #e2e8f0;
    border-radius: 12px;
    font-size: 15px;
    outline: none;
    background: #fff;
    transition: border-color 0.2s;
  }

  .input-row input:focus {
    border-color: #6c63ff;
  }

  .input-row button {
    padding: 12px 20px;
    background: #6c63ff;
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    white-space: nowrap;
  }

  .input-row button:hover { background: #5a52d5; }
  .input-row button:active { transform: scale(0.97); }

  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
    background: #e2e8f0;
    border-radius: 12px;
    padding: 4px;
  }

  .tab {
    flex: 1;
    padding: 8px;
    text-align: center;
    border-radius: 9px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    color: #64748b;
    transition: all 0.2s;
    user-select: none;
  }

  .tab.active {
    background: #fff;
    color: #6c63ff;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }

  .count-badge {
    display: inline-block;
    background: #6c63ff;
    color: #fff;
    border-radius: 99px;
    font-size: 11px;
    padding: 1px 7px;
    margin-left: 4px;
    vertical-align: middle;
  }

  .tab:not(.active) .count-badge {
    background: #94a3b8;
  }

  .task-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .task-card {
    background: #fff;
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .task-card.done .task-title {
    text-decoration: line-through;
    color: #94a3b8;
  }

  .check-btn {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 2px solid #cbd5e1;
    background: #fff;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: all 0.2s;
  }

  .check-btn:hover { border-color: #6c63ff; background: #f0eeff; }

  .task-card.done .check-btn {
    background: #6c63ff;
    border-color: #6c63ff;
    color: #fff;
  }

  .task-info { flex: 1; min-width: 0; }

  .task-title {
    font-size: 15px;
    font-weight: 500;
    color: #1e293b;
    word-break: break-word;
  }

  .task-date {
    font-size: 12px;
    color: #94a3b8;
    margin-top: 2px;
  }

  .delete-btn {
    background: none;
    border: none;
    color: #cbd5e1;
    font-size: 18px;
    cursor: pointer;
    padding: 4px;
    border-radius: 6px;
    transition: color 0.2s;
    flex-shrink: 0;
    line-height: 1;
  }

  .delete-btn:hover { color: #ef4444; }

  .empty {
    text-align: center;
    color: #94a3b8;
    font-size: 15px;
    padding: 48px 0;
  }

  .empty span { display: block; font-size: 36px; margin-bottom: 8px; }
</style>
</head>
<body>
<div class="container">
  <h1>📋 タスク管理</h1>

  <div class="input-row">
    <input type="text" id="newTask" placeholder="新しいタスクを入力..." />
    <button onclick="addTask()">追加</button>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('pending')" id="tab-pending">
      未着手 <span class="count-badge" id="count-pending">0</span>
    </div>
    <div class="tab" onclick="switchTab('done')" id="tab-done">
      完了 <span class="count-badge" id="count-done">0</span>
    </div>
  </div>

  <div class="task-list" id="task-list"></div>
</div>

<script>
  const STORAGE_KEY = 'tasks_v1';
  let currentTab = 'pending';

  function load() {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  }

  function save(tasks) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
  }

  function nextId(tasks) {
    return tasks.length === 0 ? 1 : Math.max(...tasks.map(t => t.id)) + 1;
  }

  function formatDate(iso) {
    const d = new Date(iso);
    return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  function addTask() {
    const input = document.getElementById('newTask');
    const title = input.value.trim();
    if (!title) return;

    const tasks = load();
    tasks.push({ id: nextId(tasks), title, done: false, createdAt: new Date().toISOString() });
    save(tasks);
    input.value = '';
    render();
  }

  function toggleDone(id) {
    const tasks = load();
    const t = tasks.find(t => t.id === id);
    if (t) {
      t.done = !t.done;
      t.doneAt = t.done ? new Date().toISOString() : null;
    }
    save(tasks);
    render();
  }

  function deleteTask(id) {
    save(load().filter(t => t.id !== id));
    render();
  }

  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tab-pending').classList.toggle('active', tab === 'pending');
    document.getElementById('tab-done').classList.toggle('active', tab === 'done');
    render();
  }

  function render() {
    const tasks = load();
    const pending = tasks.filter(t => !t.done);
    const done    = tasks.filter(t => t.done);

    document.getElementById('count-pending').textContent = pending.length;
    document.getElementById('count-done').textContent    = done.length;

    const list = currentTab === 'pending' ? pending : done;
    const container = document.getElementById('task-list');

    if (list.length === 0) {
      container.innerHTML = `<div class="empty"><span>${currentTab === 'pending' ? '🎉' : '📭'}</span>${currentTab === 'pending' ? 'タスクはありません' : '完了したタスクはありません'}</div>`;
      return;
    }

    container.innerHTML = list.map(t => `
      <div class="task-card ${t.done ? 'done' : ''}">
        <button class="check-btn" onclick="toggleDone(${t.id})">${t.done ? '✓' : ''}</button>
        <div class="task-info">
          <div class="task-title">${escHtml(t.title)}</div>
          <div class="task-date">${t.done && t.doneAt ? '完了: ' + formatDate(t.doneAt) : '作成: ' + formatDate(t.createdAt)}</div>
        </div>
        <button class="delete-btn" onclick="deleteTask(${t.id})">×</button>
      </div>
    `).join('');
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.getElementById('newTask').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  render();
</script>
</body>
</html>
