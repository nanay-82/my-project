<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アラームアプリ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 20px 60px rgba(102, 126, 234, 0.3); }
            50% { box-shadow: 0 20px 80px rgba(102, 126, 234, 0.6); }
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: float 20s linear infinite;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 50px 40px;
            box-shadow: 0 30px 100px rgba(0, 0, 0, 0.2);
            max-width: 450px;
            width: 90%;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            animation: glow 3s ease-in-out infinite;
            position: relative;
            z-index: 1;
        }

        h1 {
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            font-size: 32px;
            font-weight: 700;
            animation: pulse 2s ease-in-out infinite;
        }

        .subtitle {
            text-align: center;
            color: #999;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 12px;
            color: #555;
            font-weight: 600;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="time"] {
            width: 100%;
            padding: 16px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 18px;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #f5f7ff 0%, #f0f4ff 100%);
            font-weight: 500;
        }

        input[type="time"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
            background: white;
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.5);
        }

        button:active {
            transform: translateY(-1px);
        }

        .status {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: #888;
            min-height: 24px;
        }

        .status.active {
            color: #667eea;
            font-weight: 600;
            animation: pulse 1s ease-in-out;
        }

        .time-display {
            text-align: center;
            margin-top: 30px;
            font-size: 24px;
            color: #333;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
        }

        .time-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔔 ALARM</h1>
        <p class="subtitle">スマートアラームアプリ</p>

        <div class="input-group">
            <label for="alarmTime">⏰ アラーム時刻</label>
            <input type="time" id="alarmTime" required>
        </div>

        <button onclick="setAlarm()">アラームをセット</button>

        <div class="status" id="status"></div>
        <div class="time-label">現在時刻</div>
        <div class="time-display" id="timeDisplay"></div>
    </div>

    <script>
        let alarmActive = false;
        let alarmTime = null;

        function updateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('timeDisplay').textContent = `現在時刻: ${hours}:${minutes}:${seconds}`;

            if (alarmActive) {
                const currentTime = `${hours}:${minutes}`;
                if (currentTime === alarmTime) {
                    triggerAlarm();
                    alarmActive = false;
                    document.getElementById('status').textContent = '';
                    document.getElementById('status').classList.remove('active');
                }
            }
        }

        function setAlarm() {
            const timeInput = document.getElementById('alarmTime').value;
            if (!timeInput) {
                alert('時刻を選択してください');
                return;
            }

            alarmTime = timeInput;
            alarmActive = true;

            const statusEl = document.getElementById('status');
            statusEl.textContent = `✓ アラームを ${timeInput} に設定しました`;
            statusEl.classList.add('active');
        }

        function triggerAlarm() {
            alert('🔔 アラーム！');

            // 音を再生
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    playBeep(audioContext);
                }, i * 1000);
            }
        }

        function playBeep(audioContext) {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = 1000;
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.5);
        }

        // 時刻を1秒ごとに更新
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
